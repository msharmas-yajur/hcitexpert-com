<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title | escape }} – {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:wght@400;700&family=Newsreader:ital,opsz,wght@0,6..72,400;1,6..72,400&display=swap" rel="stylesheet">
  {% feed_meta %}
  {% seo %}
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="site-logo" href="{{ '/' | relative_url }}">HCITEXPERTS</a>
      <nav class="header-nav">
        <a href="{{ '/blog/' | relative_url }}">BLOG</a>
        <a href="{{ '/about-hcitexpert/' | relative_url }}">ABOUT</a>
        <a href="{{ '/contact-us/' | relative_url }}">CONTACT</a>
        <a href="{{ site.feed.path | default: '/feed.xml' | relative_url }}" class="btn-subscribe">SUBSCRIBE</a>
      </nav>
    </div>
  </header>

  <main>{{ content }}</main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-wordmark">HCITEXPERTS</div>
      <p class="footer-desc">Healthcare IT insights by Yajur Healthcare since 2013</p>
      <nav class="footer-nav">
        <a href="{{ '/' | relative_url }}">HOME</a>
        <a href="{{ '/about-hcitexpert/' | relative_url }}">ABOUT</a>
        <a href="{{ '/contact-us/' | relative_url }}">CONTACT</a>
        <a href="{{ site.feed.path | default: '/feed.xml' | relative_url }}">RSS</a>
      </nav>
      <p class="footer-copy">&copy; {{ site.time | date: '%Y' }} HCITExperts &middot; Yajur Healthcare</p>
    </div>
  </footer>

</body>
</html>
