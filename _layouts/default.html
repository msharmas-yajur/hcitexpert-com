<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title | escape }} – {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="{{ '/assets/images/favicon.png' | relative_url }}">
  <link rel="shortcut icon" type="image/png" href="{{ '/assets/images/favicon.png' | relative_url }}">
  {% feed_meta %}
  {% seo %}
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="site-logo" href="{{ '/' | relative_url }}">
        <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="HCITExperts" height="36">
      </a>
      <nav class="header-nav">
        <a href="{{ '/' | relative_url }}">Blog</a>
        <a href="{{ '/about-hcitexpert/' | relative_url }}">About</a>
        <a href="{{ '/contact-us/' | relative_url }}">Contact</a>
        <a href="{{ site.feed.path | default: '/feed.xml' | relative_url }}" class="btn-subscribe">Subscribe</a>
      </nav>
    </div>
  </header>

  <main>{{ content }}</main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="HCITExperts" height="28">
        <p>Healthcare IT insights by Yajur Healthcare since 2013.</p>
      </div>
      <nav class="footer-nav">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about-hcitexpert/' | relative_url }}">About</a>
        <a href="{{ '/contact-us/' | relative_url }}">Contact</a>
        <a href="{{ site.feed.path | default: '/feed.xml' | relative_url }}">RSS</a>
      </nav>
    </div>
    <div class="footer-copy">
      <p>&copy; {{ site.time | date: '%Y' }} HCITExperts &middot; Yajur Healthcare. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
