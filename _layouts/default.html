<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title | escape }} – {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  {% feed_meta %}
  {% seo %}
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="site-logo" href="{{ '/' | relative_url }}">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="28" height="28" rx="4" fill="#1a1a1a"/>
          <text x="5" y="20" font-family="Inter" font-weight="700" font-size="14" fill="white">HC</text>
        </svg>
        <span>HCITExperts</span>
      </a>
      <nav class="header-nav">
        <a href="{{ '/blog/' | relative_url }}">Blog</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/contact-us/' | relative_url }}">Contact</a>
        <a href="{{ site.feed.path | default: '/feed.xml' | relative_url }}" class="btn-rss">RSS</a>
      </nav>
    </div>
  </header>

  <main>{{ content }}</main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <strong>HCITExperts</strong>
        <span>Healthcare IT insights by Yajur Healthcare</span>
      </div>
      <nav class="footer-nav">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/contact-us/' | relative_url }}">Contact</a>
        <a href="{{ site.feed.path | default: '/feed.xml' | relative_url }}">RSS</a>
      </nav>
      <p class="footer-copy">&copy; {{ site.time | date: '%Y' }} HCITExperts · Yajur Healthcare</p>
    </div>
  </footer>

</body>
</html>
